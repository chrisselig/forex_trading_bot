site_name: Forex Trading Bot
site_description: Event-driven forex trading bot for major US economic news releases
site_author: Chris Selig
repo_url: https://github.com/chrisselig/forex_trading_bot
repo_name: chrisselig/forex_trading_bot

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - content.code.copy
    - search.highlight
    - search.suggest
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Forex Trading:
    - trading/index.md
    - trading/glossary.md
    - trading/market-structure.md
    - trading/news-trading.md
    - trading/risk-management.md
  - Getting Started:
    - getting-started/index.md
    - getting-started/installation.md
    - getting-started/configuration.md
  - Trading Strategies:
    - trading/strategies.md
    - trading/target-events.md
    - trading/currency-pairs.md
  - Architecture:
    - architecture/index.md
    - architecture/ib-api.md
  - Operations:
    - operations/index.md
    - operations/auto-start.md
    - operations/process-management.md
    - operations/telegram-notifications.md
  - Analysis:
    - research/12-mc-remaining-us.md
    - research/11-mc-audusd-australia.md
    - research/10-mc-cad-pairs.md
    - research/09-mc-gdp-pce.md
    - research/08-mc-ppi.md
    - research/07-mc-eurusd-audusd.md
    - research/06-non-us-events.md
    - research/05-event-type-split.md
    - research/04-monte-carlo-6yr.md
    - research/03-monte-carlo-18mo.md
    - research/02-dukascopy-data.md
    - research/01-straddle-hourly.md
    - research/todo.md
