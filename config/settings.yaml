broker:
  host: "127.0.0.1"
  port: 4002
  client_id: 1
  timeout: 30

trading:
  instruments:
    - USDZAR
    - USDTRY
    - GBPJPY
    - GBPUSD
    - USDCAD
  default_timeframe: "5 mins"

risk:
  max_risk_per_trade_pct: 1.0
  max_daily_drawdown_pct: 3.0
  max_concurrent_positions: 3
  mandatory_stop_loss: true
  max_spread_pips: 15.0

strategy:
  pre_event_minutes: 30
  post_event_minutes: 60
  straddle_distance_pips: 15   # Default (GBPUSD-optimized via Monte Carlo)
  straddle_tp_pips: 40         # Walk-forward validated on GBPUSD
  straddle_sl_pips: 10         # Min 10 pips for news event spread safety
  straddle_pair_overrides:
    USDCAD:
      distance_pips: 15
      tp_pips: 20
      sl_pips: 10
    GBPJPY:
      distance_pips: 45
      tp_pips: 35
      sl_pips: 10
    USDZAR:
      distance_pips: 10
      tp_pips: 70
      sl_pips: 10
    USDTRY:
      distance_pips: 50
      tp_pips: 70
      sl_pips: 10
  surprise_threshold_pct: 10.0
  surprise_entry_delay_seconds: 5
  surprise_tp_pips: 25
  surprise_sl_pips: 15
  max_holding_minutes: 120
