broker:
  host: "127.0.0.1"
  port: 4002
  client_id: 1
  timeout: 30

trading:
  instruments:
    - USDZAR
    - USDTRY
    - GBPUSD
    # GBPJPY and USDCAD disabled — MC analysis (Jun 2026) shows overfit/marginal results
    # Re-enable after re-running MC with 2020-2026 data if walk-forward passes
  default_timeframe: "5 mins"

risk:
  max_risk_per_trade_pct: 1.0
  max_daily_drawdown_pct: 3.0
  max_concurrent_positions: 3
  mandatory_stop_loss: true
  max_spread_pips: 15.0

strategy:
  pre_event_minutes: 30
  post_event_minutes: 60
  straddle_distance_pips: 35   # Default (GBPUSD — 1-min Monte Carlo, Jun 2026)
  straddle_tp_pips: 15         # 1:1 R:R, 71.4% win rate
  straddle_sl_pips: 15         # Min 10 pips for news event spread safety
  straddle_pair_overrides:
    # USDCAD and GBPJPY removed — not recommended by MC analysis (Jun 2026)
    USDZAR:
      distance_pips: 45
      tp_pips: 70
      sl_pips: 10
    USDTRY:
      distance_pips: 50
      tp_pips: 70
      sl_pips: 10
  surprise_threshold_pct: 10.0
  surprise_entry_delay_seconds: 5
  surprise_tp_pips: 25
  surprise_sl_pips: 15
  max_holding_minutes: 120
