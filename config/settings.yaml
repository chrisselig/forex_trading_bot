broker:
  host: "127.0.0.1"
  port: 4002
  client_id: 1
  timeout: 30

trading:
  instruments:
    - USDZAR
    - USDTRY
    - USDJPY  # Paper-trade only: BOJ events (25/15/15), borderline CI — re-evaluate end of 2026
    - AUDUSD  # Paper-trade: US events (40/15/25) + AU events (40/70/30) — see 11-mc-audusd-australia.md
    # GBPUSD removed — 6.5yr MC analysis (Jun 2026) shows below breakeven, fails walk-forward
    # GBPJPY and USDCAD also excluded — marginal CIs, walk-forward failures
  default_timeframe: "5 mins"

risk:
  max_risk_per_trade_pct: 1.5
  max_daily_drawdown_pct: 5.0
  max_concurrent_positions: 4
  mandatory_stop_loss: true
  # Bug-catcher backstop now that TWS precautionary size limits are bypassed
  # for API orders (IBC BypassOrderPrecautions=yes). Above legit exotic-pair
  # sizing (USDTRY straddles ~2.5M units); an order past this is a sizing bug.
  max_order_units: 10000000
  max_spread_pips: 15.0          # Default for majors
  max_spread_overrides:           # Per-pair overrides for exotics
    USDZAR: 60.0                  # Event-time spreads routinely 25-50 pips
    USDTRY: 80.0                  # Event-time spreads routinely 30-60 pips
    USDJPY: 20.0                  # Wider than majors during BOJ
    AUDUSD: 15.0                  # Major pair, should be tight even at event time

strategy:
  pre_event_minutes: 30
  post_event_minutes: 60
  min_pre_event_lead_seconds: 90   # Late-start catch-up: place straddle only if >= this much lead remains
  straddle_distance_pips: 50   # Default (USDZAR/USDTRY — 6.5yr MC, Jun 2026)
  straddle_tp_pips: 70         # 7:1 R:R, 30.7% win rate (breakeven 12.5%)
  straddle_sl_pips: 10         # Min 10 pips for news event spread safety
  straddle_pair_overrides:
    # Only USDZAR and USDTRY pass walk-forward (2020-2024 train, 2025-2026 test)
    USDZAR:
      distance_pips: 50
      tp_pips: 70
      sl_pips: 10
    USDTRY:
      distance_pips: 50        # US events (NFP/CPI/FOMC) — 6.5yr MC
      tp_pips: 70
      sl_pips: 10
      event_overrides:
        TCMB Interest Rate Decision:  # non-US MC (Jun 2026); key must exactly match the event target name/alias
          distance_pips: 20     # Tighter: TCMB moves are faster and more contained
          tp_pips: 60
          sl_pips: 10
    USDJPY:
      distance_pips: 25
      tp_pips: 15
      sl_pips: 15
    AUDUSD:
      distance_pips: 40       # AU events default (RBA, AU CPI, AU Employment) — 11-mc-audusd-australia.md
      tp_pips: 70
      sl_pips: 30
      event_overrides:
        NFP:                   # US events use tighter TP (40/15/25) — 11-mc-audusd-australia.md
          distance_pips: 40
          tp_pips: 15
          sl_pips: 25
        CPI m/m:
          distance_pips: 40
          tp_pips: 15
          sl_pips: 25
        FOMC:
          distance_pips: 40
          tp_pips: 15
          sl_pips: 25
        PPI:
          distance_pips: 40
          tp_pips: 15
          sl_pips: 25
        GDP q/q:
          distance_pips: 40
          tp_pips: 15
          sl_pips: 25
        PCE:
          distance_pips: 40
          tp_pips: 15
          sl_pips: 25
  surprise_threshold_pct: 10.0
  surprise_entry_delay_seconds: 5
  surprise_tp_pips: 25
  surprise_sl_pips: 15
  max_holding_minutes: 120

carry:
  enabled: true
  instruments: [USDZAR, USDTRY, USDMXN, AUDJPY, NZDJPY]
  min_differential_pct: 2.0
  risk_budget_pct: 5.0
  max_concurrent_carry: 5
  max_risk_per_carry_pct: 5.0
  stop_loss_pct: 5.0
  rebalance_day_of_week: mon  # Monday: TWS is up, FX is liquid (avoids weekend TWS-down + wide Sunday-open spreads)
  rebalance_hour_utc: 14  # 14:00 UTC = 8 AM MT / 10 AM ET (London-NY overlap, tight spreads)
  fallback_rates:
    # Safety net only — TRY now resolves live via FRED IRSTCI01TRM156N (OECD
    # call money, ~35.5% as of 2026-03). Used solely if the FRED fetch fails.
    TRY: 35.0
  max_spread_pips: 30.0
  max_spread_overrides:
    USDZAR: 60.0
    USDTRY: 80.0

# Value / PPP — long undervalued currencies, short overvalued ones, judged by
# the real exchange rate's deviation from its long-run mean (relative PPP).
# Developed-market majors only (their real rates mean-revert; exotics trend).
# UNVALIDATED: no Monte Carlo walk-forward backs this yet — keep disabled until
# validated. Rebalances monthly on the 1st at 14:37 UTC.
value:
  enabled: false
  instruments: [EURUSD, GBPUSD, USDJPY, USDCAD, AUDUSD, NZDUSD, USDCHF]
  lookback_years: 8         # window for the real-exchange-rate mean
  z_threshold: 1.0          # min |z-score| of RER deviation to trade
  max_concurrent_value: 4
  max_risk_per_value_pct: 1.0
  stop_loss_pct: 8.0        # wide — value positions held for months
  rebalance_day_of_month: 1
  rebalance_hour_utc: 14
  rebalance_minute: 37
  max_spread_pips: 20.0
  max_spread_overrides: {}
