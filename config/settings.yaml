broker:
  host: "127.0.0.1"
  port: 4002
  client_id: 1
  timeout: 30

trading:
  instruments:
    - USDZAR
    - USDTRY
    - USDJPY  # Paper-trade only: BOJ events (25/15/15), borderline CI — re-evaluate end of 2026
    - AUDUSD  # Paper-trade: US events (40/15/25) + AU events (40/70/30) — see 11-mc-audusd-australia.md
    # GBPUSD removed — 6.5yr MC analysis (Jun 2026) shows below breakeven, fails walk-forward
    # GBPJPY and USDCAD also excluded — marginal CIs, walk-forward failures
  default_timeframe: "5 mins"

risk:
  max_risk_per_trade_pct: 1.5
  max_daily_drawdown_pct: 3.0
  max_concurrent_positions: 4
  mandatory_stop_loss: true
  max_spread_pips: 15.0          # Default for majors
  max_spread_overrides:           # Per-pair overrides for exotics
    USDZAR: 60.0                  # Event-time spreads routinely 25-50 pips
    USDTRY: 80.0                  # Event-time spreads routinely 30-60 pips
    USDJPY: 20.0                  # Wider than majors during BOJ
    AUDUSD: 15.0                  # Major pair, should be tight even at event time

strategy:
  pre_event_minutes: 30
  post_event_minutes: 60
  min_pre_event_lead_seconds: 90   # Late-start catch-up: place straddle only if >= this much lead remains
  straddle_distance_pips: 50   # Default (USDZAR/USDTRY — 6.5yr MC, Jun 2026)
  straddle_tp_pips: 70         # 7:1 R:R, 30.7% win rate (breakeven 12.5%)
  straddle_sl_pips: 10         # Min 10 pips for news event spread safety
  straddle_pair_overrides:
    # Only USDZAR and USDTRY pass walk-forward (2020-2024 train, 2025-2026 test)
    USDZAR:
      distance_pips: 50
      tp_pips: 70
      sl_pips: 10
    USDTRY:
      distance_pips: 50        # US events (NFP/CPI/FOMC) — 6.5yr MC
      tp_pips: 70
      sl_pips: 10
      event_overrides:
        TCMB:                   # TCMB Rate Decision — non-US MC (Jun 2026)
          distance_pips: 20     # Tighter: TCMB moves are faster and more contained
          tp_pips: 60
          sl_pips: 10
    USDJPY:
      distance_pips: 25
      tp_pips: 15
      sl_pips: 15
    AUDUSD:
      distance_pips: 40       # AU events default (RBA, AU CPI, AU Employment) — 11-mc-audusd-australia.md
      tp_pips: 70
      sl_pips: 30
      event_overrides:
        NFP:                   # US events use tighter TP (40/15/25) — 11-mc-audusd-australia.md
          distance_pips: 40
          tp_pips: 15
          sl_pips: 25
        CPI m/m:
          distance_pips: 40
          tp_pips: 15
          sl_pips: 25
        FOMC:
          distance_pips: 40
          tp_pips: 15
          sl_pips: 25
        PPI:
          distance_pips: 40
          tp_pips: 15
          sl_pips: 25
        GDP:
          distance_pips: 40
          tp_pips: 15
          sl_pips: 25
        PCE:
          distance_pips: 40
          tp_pips: 15
          sl_pips: 25
  surprise_threshold_pct: 10.0
  surprise_entry_delay_seconds: 5
  surprise_tp_pips: 25
  surprise_sl_pips: 15
  max_holding_minutes: 120

carry:
  enabled: true
  instruments: [USDZAR, USDTRY, USDMXN, AUDJPY, NZDJPY]
  min_differential_pct: 2.0
  risk_budget_pct: 5.0
  max_concurrent_carry: 5
  max_risk_per_carry_pct: 1.5
  stop_loss_pct: 5.0
  rebalance_day_of_week: sun
  rebalance_hour_utc: 11
  fallback_rates:
    TRY: 50.0
  max_spread_pips: 30.0
  max_spread_overrides:
    USDZAR: 60.0
    USDTRY: 80.0
