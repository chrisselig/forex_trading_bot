target_events:
  # --- US Events ---
  - name: "Non-Farm Employment Change"
    aliases: ["NFP", "Non-Farm Payrolls", "Nonfarm Payrolls"]
    fred_series: "PAYEMS"
    pairs: ["USDZAR", "USDTRY", "AUDUSD"]
    impact: "high"

  - name: "CPI m/m"
    aliases: ["Consumer Price Index"]
    fred_series: "CPIAUCSL"
    pairs: ["USDZAR", "USDTRY", "AUDUSD"]
    impact: "high"

  - name: "Federal Funds Rate"
    aliases: ["FOMC", "Fed Interest Rate Decision", "FOMC Statement"]
    fred_series: "FEDFUNDS"
    pairs: ["USDZAR", "USDTRY", "AUDUSD"]
    impact: "high"

  - name: "PPI m/m"
    aliases: ["Producer Price Index", "PPI"]
    fred_series: "PPIACO"
    pairs: ["USDZAR", "USDTRY", "AUDUSD"]
    impact: "high"

  - name: "GDP q/q"
    aliases: ["Gross Domestic Product", "Advance GDP", "Preliminary GDP", "Final GDP"]
    fred_series: "GDP"
    pairs: ["USDZAR", "USDTRY", "AUDUSD"]
    impact: "high"

  - name: "Core PCE Price Index m/m"
    aliases: ["PCE", "Personal Consumption Expenditures", "PCE Price Index"]
    fred_series: "PCEPI"
    pairs: ["USDTRY", "AUDUSD"]    # USDZAR fails walk-forward (OOS=-0.7)
    impact: "high"

  # --- US Events (USDTRY only — see docs/research/12-mc-remaining-us.md) ---
  - name: "Unemployment Claims"
    aliases: ["Initial Claims", "Initial Jobless Claims", "Jobless Claims"]
    pairs: ["USDTRY"]    # USDZAR/AUDUSD fail (no edge)
    impact: "high"

  - name: "ISM Manufacturing PMI"
    aliases: ["ISM Manufacturing", "ISM PMI", "Manufacturing PMI"]
    pairs: ["USDTRY"]    # USDZAR/AUDUSD fail (no edge)
    impact: "high"

  - name: "Retail Sales m/m"
    aliases: ["Retail Sales", "Advance Retail Sales", "Core Retail Sales"]
    pairs: ["USDTRY"]    # USDZAR/AUDUSD fail (no edge)
    impact: "high"

  # --- DISABLED (redundant) ---
  # - name: "Unemployment Rate"          # REDUNDANT — same release as NFP (Employment Situation)

  # --- Australia Events (paper-trade AUDUSD — 40/70/30, see 11-mc-audusd-australia.md) ---
  - name: "RBA Rate Decision"
    aliases: ["RBA Interest Rate Decision", "RBA Cash Rate", "Reserve Bank of Australia"]
    country: "AUD"
    pairs: ["AUDUSD"]
    impact: "high"

  - name: "Australia CPI"
    aliases: ["AU CPI", "Australian CPI", "CPI q/q"]
    country: "AUD"
    pairs: ["AUDUSD"]
    impact: "high"

  - name: "Australia Employment"
    aliases: ["AU Employment Change", "Australian Employment", "Employment Change"]
    country: "AUD"
    pairs: ["AUDUSD"]
    impact: "high"

  # --- Japan Events (paper-trade USDJPY) ---
  - name: "BOJ Policy Rate"
    aliases: ["BOJ Rate", "BOJ Interest Rate Decision", "BOJ Rate Decision", "Monetary Policy Statement"]
    country: "JPY"
    pairs: ["USDJPY"]
    impact: "high"

  # --- South Africa Events (USDZAR — same 50/70/10 as US events) ---
  - name: "SARB Interest Rate Decision"
    aliases: ["SARB Rate", "South African Reserve Bank", "Repo Rate"]
    country: "ZAR"
    pairs: ["USDZAR"]
    impact: "high"

  - name: "CPI y/y"
    aliases: ["South Africa CPI", "SA CPI"]
    country: "ZAR"
    pairs: ["USDZAR"]
    impact: "high"

  # --- Turkey Events (USDTRY — uses 20/60/10 via event_overrides) ---
  - name: "TCMB Interest Rate Decision"
    aliases: ["TCMB Rate", "One-Week Repo Rate", "Turkish Central Bank"]
    country: "TRY"
    pairs: ["USDTRY"]
    impact: "high"

filters:
  country:
    - "USD"
    - "AUD"
    - "JPY"
    - "ZAR"
    - "TRY"
  min_impact: "high"
